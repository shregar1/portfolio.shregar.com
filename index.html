<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = 'portfolio-theme'
          var t = localStorage.getItem(k)
          if (t !== 'light' && t !== 'dark') {
            t = 'dark'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shreyansh — Senior AI Engineer / Senior Software Engineer. Back-end development, AI/ML, Rust, Python."
    />
    <title>Shreyansh</title>
    <link rel="preconnect" href="https://tapback.co" crossorigin />
    <link rel="dns-prefetch" href="https://tapback.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
