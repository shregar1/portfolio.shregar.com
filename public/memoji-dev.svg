  <path fill="#3d2818" d="M182 96c-10 14-8 32 4 38-6-18-4-34 8-42-12 10-16 24-12 4Z" opacity="0.92"/>
  <ellipse cx="118" cy="78" rx="14" ry="18" fill="#3d2818" transform="rotate(-20 118 78)"/>
  <ellipse cx="138" cy="78" rx="14" ry="18" fill="#3d2818" transform="rotate(20 138 78)"/>

  <!-- Crew neck / tee -->
  <path fill="#0e7490" d="M56 198c0-26 32-48 72-48s72 22 72 48v58H56v-58Z"/>
  <path fill="#155e75" d="M128 150c-22 0-40 10-48 24 14-6 30-10 48-10s34 4 48 10c-8-14-26-24-48-24Z"/>
  <ellipse cx="128" cy="168" fill="#164e63" rx="22" ry="8"/>
