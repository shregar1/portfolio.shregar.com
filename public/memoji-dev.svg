<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="216" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0.26"/>
    </linearGradient>
    <radialGradient id="face" cx="128" cy="125" r="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0d4bc"/>
      <stop offset="0.55" stop-color="#e8c4a8"/>
      <stop offset="1" stop-color="#d9a88a"/>
    </radialGradient>
    <linearGradient id="lip" x1="118" y1="178" x2="138" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8a0a8"/>
      <stop offset="0.5" stop-color="#d87888"/>
      <stop offset="1" stop-color="#c45a6a"/>
    </linearGradient>
    <linearGradient id="iris" x1="96" y1="136" x2="108" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5c3d2e"/>
      <stop offset="0.45" stop-color="#7a4e32"/>
      <stop offset="1" stop-color="#4a3018"/>
    </linearGradient>
    <linearGradient id="iris2" x1="148" y1="136" x2="160" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5c3d2e"/>
      <stop offset="0.45" stop-color="#7a4e32"/>
      <stop offset="1" stop-color="#4a3018"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="108" fill="#0a0a0c" opacity="0.32"/>

