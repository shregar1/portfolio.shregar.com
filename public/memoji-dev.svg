  <path fill="#c65a72" d="M102 170c8-2 18-4 26-4s18 2 26 4c0 4-12 10-26 10s-26-6-26-10Z"/>
  <path fill="url(#lip)" d="M100 174c10 0 18 10 28 10s18-10 28-10c0 12-12 20-28 20s-28-8-28-20Z"/>
  <path fill="#f5b8c4" opacity="0.65" d="M108 182c6 8 14 10 20 10s14-2 20-10c-4 6-12 8-20 8s-16-2-20-8Z"/>
  <path stroke="#fff" stroke-linecap="round" stroke-width="1.8" opacity="0.45" d="M118 178c6 2 12 3 14 3s8-1 14-3"/>
  <ellipse cx="128" cy="188" fill="#a84858" opacity="0.28" rx="12" ry="5"/>

