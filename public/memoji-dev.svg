  <ellipse cx="158" cy="134" fill="#1a1208" rx="4.5" ry="5"/>
  <ellipse cx="100" cy="132" fill="#fff" opacity="0.85" rx="2.2" ry="2.6"/>
  <ellipse cx="160" cy="132" fill="#fff" opacity="0.85" rx="2.2" ry="2.6"/>
  <ellipse cx="96.5" cy="135.5" fill="#fff" opacity="0.35" rx="1.2" ry="1.4"/>
  <ellipse cx="156.5" cy="135.5" fill="#fff" opacity="0.35" rx="1.2" ry="1.4"/>

