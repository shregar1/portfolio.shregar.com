  <path stroke="#c49a7a" stroke-linecap="round" stroke-width="2.2" opacity="0.45" d="M128 148c0 6 2 12 6 14"/>
  <ellipse cx="128" cy="158" fill="#d4a88a" opacity="0.25" rx="8" ry="5"/>

