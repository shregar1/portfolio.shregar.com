    <ellipse cx="184" cy="90" rx="22" ry="28" transform="rotate(15 184 90)"/>
    <ellipse cx="96" cy="56" rx="26" ry="32" transform="rotate(-8 96 56)"/>
    <ellipse cx="128" cy="48" rx="30" ry="36"/>
    <ellipse cx="160" cy="56" rx="26" ry="32" transform="rotate(8 160 56)"/>
    <ellipse cx="52" cy="112" rx="18" ry="24" transform="rotate(-25 52 112)"/>
    <ellipse cx="204" cy="114" rx="18" ry="24" transform="rotate(25 204 114)"/>
    <ellipse cx="112" cy="44" rx="20" ry="26"/>
    <ellipse cx="144" cy="44" rx="20" ry="26"/>
  </g>
  <g fill="#2d1810" opacity="0.85">
