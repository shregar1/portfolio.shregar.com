  <ellipse cx="196" cy="138" fill="url(#face)" rx="15" ry="19" transform="rotate(10 196 138)"/>

  <!-- Face — clean shave, soft jaw -->
  <ellipse cx="128" cy="136" fill="url(#face)" rx="66" ry="76"/>

  <!-- Cheek tint -->
  <ellipse cx="86" cy="150" fill="#f472b6" opacity="0.14" rx="16" ry="10"/>
  <ellipse cx="170" cy="150" fill="#f472b6" opacity="0.14" rx="16" ry="10"/>

